# This file is designed for production server deployment, not local development work
# For a containerized local dev environment, see: https://github.com/mastodon/mastodon/blob/main/docs/DEVELOPMENT.md#docker

x-sidekiq: &sidekiq
  # You can uncomment the following line if you want to not use the prebuilt image, for example if you have local code changes
  # build: .
  image: ghcr.io/mastodon/mastodon:v4.5.11
  env_file: .env.production
  command: bundle exec sidekiq
  depends_on:
    - db
    - redis
  networks:
    - external_network
    - internal_network
  healthcheck:
    test: ['CMD-SHELL', "ps aux | grep '[s]idekiq\ 8' || false"]
  deploy:
    replicas: 5

services:
  db: &db
    image: postgres:14-alpine
    networks:
      - internal_network
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'postgres']
      start_period: 10m
    volumes:
      - ./postgres14:/var/lib/postgresql/data
    environment:
      - 'POSTGRES_HOST_AUTH_METHOD=trust'
    deploy:
      replicas: 1
      placement:
        constraints: [node.hostname == okaya]

  db_backup:
    <<: *db
    command: sh -c "pg_basebackup -F t -D /backups/`date +%Y%m%d` -z -h db -U postgres -P && chown 1000:1000 -R /backups/*"
    networks:
      - internal_network
    healthcheck:
      disable: true
    volumes:
      - ./postgres_backups:/backups
      - /usr/share/zoneinfo/Asia/Tokyo:/etc/localtime
    deploy:
      placement:
        constraints: [node.hostname == okaya]
      replicas: 0
      restart_policy:
        condition: none

  redis:
    image: redis:7-alpine
    networks:
      - internal_network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
    volumes:
      - ./redis:/data
    deploy:
      placement:
        constraints: [node.hostname == okaya]

  es:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.29
    environment:
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m -Des.enforce.bootstrap.checks=true"
      - "xpack.license.self_generated.type=basic"
      - "xpack.security.enabled=false"
      - "xpack.watcher.enabled=false"
      - "xpack.graph.enabled=false"
      - "xpack.ml.enabled=false"
      - "bootstrap.memory_lock=true"
      - "cluster.name=es-mastodon"
      - "discovery.type=single-node"
      - "thread_pool.write.queue_size=1000"
    networks:
       - external_network
       - internal_network
    healthcheck:
       test: ["CMD-SHELL", "curl --silent --fail localhost:9200/_cluster/health || exit 1"]
    volumes:
       - ./elasticsearch:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - '9200:9200'
    deploy:
      placement:
        constraints: [node.hostname == okaya]

  web: &web
    # You can uncomment the following line if you want to not use the prebuilt image, for example if you have local code changes
    # build: .
    image: ghcr.io/mastodon/mastodon:v4.5.11
    restart: always
    env_file: .env.production
    command: bundle exec puma -C config/puma.rb
    networks:
      - external_network
      - internal_network
      - nginx_proxy_network
    healthcheck:
      # prettier-ignore
      test: ['CMD-SHELL',"curl -s --noproxy localhost localhost:3000/health | grep -q 'OK' || exit 1"]
    ports:
      - '3000:3000'
    depends_on:
      - db
      - redis
      - es
    deploy:
      mode: replicated
      replicas: 5
      endpoint_mode: vip
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
  before_migration:
    <<: *web
    command: bash -c "bundle exec rails db:migrate"
    healthcheck:
      disable: true
    ports: []
    environment:
      - SKIP_POST_DEPLOYMENT_MIGRATIONS=true
    deploy:
      placement:
        constraints: [node.hostname == okaya]
      replicas: 0
      restart_policy:
        condition: none

  maintainance:
    <<: *web
    command: bash -c "bin/tootctl accounts prune && bin/tootctl media remove && bin/tootctl media remove-orphans && bin/tootctl preview_cards remove --days=21 && bin/tootctl media usage"
    healthcheck:
      disable: true
    ports: []
    deploy:
      placement:
        constraints: [node.hostname == okaya]
      replicas: 0
      restart_policy:
        condition: none

  after_migration:
    <<: *web
    command: bash -c "bundle exec rails db:migrate"
    healthcheck:
      disable: true
    ports: []
    deploy:
      placement:
        constraints: [node.hostname == okaya]
      replicas: 0
      restart_policy:
        condition: none

  es_index:
    <<: *web
    command: bash -c "bin/tootctl search deploy --reset-chewy --concurrency=8"
    healthcheck:
      disable: true
    ports: []
    deploy:
      placement:
        constraints: [node.hostname == okaya]
      replicas: 0
      restart_policy:
        condition: none

  streaming:
    # You can uncomment the following lines if you want to not use the prebuilt image, for example if you have local code changes
    # build:
    #   dockerfile: ./streaming/Dockerfile
    #   context: .
    image: ghcr.io/mastodon/mastodon-streaming:v4.5.11
    restart: always
    env_file: .env.production
    command: node ./streaming/index.js
    networks:
      - external_network
      - nginx_proxy_network
      - internal_network
    healthcheck:
      # prettier-ignore
      test: ['CMD-SHELL', "curl -s --noproxy localhost localhost:4000/api/v1/streaming/health | grep -q 'OK' || exit 1"]
    ports:
      - '4000:4000'
    depends_on:
      - db
      - redis
    deploy:
      mode: replicated
      replicas: 5
      endpoint_mode: vip

  sidekiq_default:
    <<: *sidekiq
    command: bundle exec sidekiq -q "default"

  sidekiq_ingress:
    <<: *sidekiq
    command: bundle exec sidekiq -q "ingress"

  sidekiq_mailers:
    <<: *sidekiq
    command: bundle exec sidekiq -q "mailers"

  sidekiq_pull:
    <<: *sidekiq
    command: bundle exec sidekiq -q "pull"
    deploy:
      replicas: 10

  sidekiq_push:
    <<: *sidekiq
    command: bundle exec sidekiq -q "push"

  sidekiq_scheduler:
    <<: *sidekiq
    command: bundle exec sidekiq -q "scheduler"

  sidekiq_fasp:
    <<: *sidekiq
    command: bundle exec sidekiq -q "fasp"

  ## Uncomment to enable federation with tor instances along with adding the following ENV variables
  ## http_hidden_proxy=http://privoxy:8118
  ## ALLOW_ACCESS_TO_HIDDEN_SERVICE=true
  # tor:
  #   image: sirboops/tor
  #   networks:
  #      - external_network
  #      - internal_network
  #
  # privoxy:
  #   image: sirboops/privoxy
  #   volumes:
  #     - ./priv-config:/opt/config
  #   networks:
  #     - external_network
  #     - internal_network

networks:
  external_network:
    name: mastodon_external
    external: true
  internal_network:
    name: mastodon_internal
    external: true
  nginx_proxy_network:
    name: nginx-proxy-okaya
    external: true
